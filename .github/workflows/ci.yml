name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: uv sync --extra dev

      - name: Run tests
        run: uv run python -m pytest

      - name: Build Gemini CLI extension
        run: npm run build:gemini-cli-extension

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Validate Gemini CLI extension
        run: gemini extensions validate dist/gemini-cli-extension
