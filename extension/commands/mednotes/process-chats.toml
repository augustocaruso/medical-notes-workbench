description = "Processa backlog de chats medicos brutos para notas Obsidian."
prompt = '''
Processe chats médicos brutos de `Chats_Raw` para `Wiki_Medicina`.

Argumentos do usuário: {{args}}

Use a skill `process-medical-chats`. Ela é o runbook oficial; o resumo do
workflow está em `docs/workflows/process-chats.md`.
Use também `knowledge/workflow-output-contract.md` para responder com resumo
legível, status com emoji e próxima ação.

Invariantes do launcher:
- Rode `med_ops.py validate` e `wiki_tree.py --max-depth 4 --audit --format text` antes de fan-out.
- Paralelize apenas work items de `plan-subagents`: `triage` com até 4,
  `architect` com até 3, um raw chat por subagent.
- Aplique `triage`, `discard`, `stage-note`, catálogo, dry-run, publish e linker em série.
- Sempre rode `publish-batch --dry-run` antes do publish real.
- Publique só após `med-publish-guard approve`.
- Rode `run-linker` uma única vez ao final.
- Não despeje manifests ou JSON bruto por padrão; resuma triagem, notas
  staged/publicadas, dry-run, publish, linker, blockers e decisões pendentes.
'''
