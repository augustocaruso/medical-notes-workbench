description = "Processa backlog de chats medicos brutos para notas Obsidian."
prompt = """
Processe chats medicos brutos de Chats_Raw para Wiki_Medicina.

Argumentos do usuario: {{args}}

Use os subagents Gemini CLI desta extensao. A raiz padrao instalada e `~/.gemini/extensions/medical-notes-workbench`; se `${extensionPath}` estiver disponivel, prefira esse valor.

Fluxo:
1. Localize o script `${extensionPath}/scripts/mednotes/med_ops.py`.
2. Rode `python "<script>" validate` e resuma pendencias de configuracao.
3. Rode `python "${extensionPath}/scripts/mednotes/wiki_tree.py" --max-depth 4 --audit` para obter a taxonomia canonica, a arvore real existente e a auditoria dry-run. Se preferir, use os subcomandos equivalentes `taxonomy-canonical`, `taxonomy-tree --max-depth 4` e `taxonomy-audit` em `med_ops.py`.
4. Rode `list-pending` e `list-triados`.
5. Para raw chats pendentes, use `med-chat-triager` em paralelo, um raw chat por agente. O agente principal aplica `triage` ou `discard` via `med_ops.py`.
6. Para raw chats triados do lote, use `med-knowledge-architect` em paralelo, um raw chat por agente, com temp dir isolado por raw chat, sempre fornecendo a taxonomia canonica e a arvore real do passo 3.
7. O `med-knowledge-architect` deve seguir os documentos preservados em `${extensionPath}/knowledge/`, especialmente `knowledge-architect.md`, e escolher `taxonomy` apenas sob uma das 5 grandes areas canonicas. Atalhos como `Cardiologia/Arritmias` sao aceitos porque `med_ops.py` canoniza para `1. ClÃ­nica MÃ©dica/Cardiologia/Arritmias`.
8. Consolide os outputs no agente principal e monte manifest com `stage-note`. Se `stage-note` bloquear a taxonomia, corrija a taxonomia antes de prosseguir; nao edite o manifest manualmente.
9. Rode `med-catalog-curator` em serie para atualizar/validar `CATALOGO_WIKI.json` e aliases. Use o catalogo configurado ou o default `~/.gemini/medical-notes-workbench/CATALOGO_WIKI.json`.
10. Rode `publish-batch --dry-run` sem `--allow-new-taxonomy-leaf` por padrao.
11. Rode `med-publish-guard`; avance apenas se retornar `approve`.
12. Rode `publish-batch`.
13. Rode `${extensionPath}/scripts/mednotes/med_linker.py` uma unica vez ao final do lote.
14. Responda em portugues com resumo de triados, descartados, notas criadas, raw chats processados, canonizacoes de taxonomia, colisÃµes e linker.

Nunca edite YAML/status manualmente. Nunca sobrescreva nota existente. Se houver colisao, prefira abortar e explicar, a menos que o usuario tenha pedido sufixo. Nao crie nova raiz, grande area, especialidade ou pasta intermediaria durante criacao de notas. Use `--allow-new-taxonomy-leaf` apenas se o usuario pedir explicitamente uma nova categoria-folha sob um pai existente. Nao use `commit-batch` em instrucoes novas; ele existe apenas como alias temporario de compatibilidade.
"""
