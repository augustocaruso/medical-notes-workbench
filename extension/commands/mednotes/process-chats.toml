description = "Processa backlog de chats medicos brutos para notas Obsidian."
prompt = """
Processe chats medicos brutos de Chats_Raw para Wiki_Medicina.

Argumentos do usuario: {{args}}

Use os subagents Gemini CLI desta extensao. A raiz padrao instalada e `~/.gemini/extensions/medical-notes-workbench`; se `${extensionPath}` estiver disponivel, prefira esse valor.

Fluxo:
1. Localize o script `${extensionPath}/scripts/mednotes/med_ops.py`.
2. Rode `python "<script>" validate` e resuma pendencias de configuracao.
3. Rode `python "${extensionPath}/scripts/mednotes/wiki_tree.py" --max-depth 4 --audit` para obter a taxonomia canonica, a arvore real existente e a auditoria dry-run. Se preferir, use os subcomandos equivalentes `taxonomy-canonical`, `taxonomy-tree --max-depth 4` e `taxonomy-audit` em `med_ops.py`.
4. Se o usuario pedir para corrigir bagunca preexistente no vault, rode `taxonomy-migrate --dry-run --plan-output <plano.json>`. Aplique apenas com confirmacao explicita usando `taxonomy-migrate --apply --plan <plano.json> --receipt <recibo.json>`. Se houver erro, use `taxonomy-migrate --rollback --receipt <recibo.json>`. Itens `blocked` exigem decisao humana; nao force merge.
5. Rode `list-pending` e `list-triados`.
6. Para raw chats pendentes, use `med-chat-triager` em paralelo, um raw chat por agente. O agente principal aplica `triage` ou `discard` via `med_ops.py`.
7. Para raw chats triados do lote, use `med-knowledge-architect` em paralelo, um raw chat por agente, com temp dir isolado por raw chat, sempre fornecendo a taxonomia canonica e a arvore real do passo 3.
8. O `med-knowledge-architect` deve seguir os documentos preservados em `${extensionPath}/knowledge/`, especialmente `knowledge-architect.md`, e escolher `taxonomy` apenas sob uma das 5 grandes areas canonicas. Atalhos como `Cardiologia/Arritmias` sao aceitos porque `med_ops.py` canoniza para `1. Clínica Médica/Cardiologia/Arritmias`. Toda nota temporaria deve cumprir o Contrato de Formato Wiki: primeiro heading `# <title>`, definição curta em 2-4 linhas, todo `##` com emoji semântico no inicio, `## 🏁 Fechamento` com `### Resumo`, `### Key Points` e `### Frase de Prova`, `## 🔗 Notas Relacionadas`, e rodape final `---`, `[Chat Original](https://gemini.google.com/app/<fonte_id>)`, `[[_Índice_Medicina]]`.
9. Antes do staging, rode `validate-note --content <temp.md> --title <title> --raw-file <raw.md> --json`. Se houver erro formal corrigivel, rode `fix-note --content <temp.md> --title <title> --raw-file <raw.md> --output <temp-fixed.md> --json` e valide de novo. Se o relatório trouxer `requires_llm_rewrite: true`, reenviar ao `med-knowledge-architect` com `rewrite_prompt`, no maximo 2 tentativas.
10. Consolide os outputs no agente principal e monte manifest com `stage-note`. Se `stage-note` bloquear a taxonomia ou estilo, corrija antes de prosseguir; nao edite o manifest manualmente.
11. Rode `med-catalog-curator` em serie para atualizar/validar `CATALOGO_WIKI.json` e aliases. Use o catalogo configurado ou o default `~/.gemini/medical-notes-workbench/CATALOGO_WIKI.json`.
12. Rode `publish-batch --dry-run` sem `--allow-new-taxonomy-leaf` por padrao.
13. Rode `med-publish-guard`; avance apenas se retornar `approve`.
14. Rode `publish-batch`.
15. Rode `${extensionPath}/scripts/mednotes/med_linker.py` uma unica vez ao final do lote.
16. Responda em portugues com resumo de triados, descartados, notas criadas, raw chats processados, canonizacoes de taxonomia, colisões, linker e eventuais warnings de estilo.

Nunca edite YAML/status manualmente. Nunca sobrescreva nota existente. Se houver colisao, prefira abortar e explicar, a menos que o usuario tenha pedido sufixo. Nao crie nova raiz, grande area, especialidade ou pasta intermediaria durante criacao de notas. Use `--allow-new-taxonomy-leaf` apenas se o usuario pedir explicitamente uma nova categoria-folha sob um pai existente. Nao use `commit-batch` em instrucoes novas; ele existe apenas como alias temporario de compatibilidade.
"""
