description = "Cria uma nota medica didatica em Markdown."
prompt = """
Crie uma nota medica didatica em Markdown a partir do pedido do usuario.

Argumentos do usuario: {{args}}

Use a skill `create-medical-note` desta extensao.

Fluxo:
1. Identifique o tema, objetivo de estudo, publico-alvo e nivel de detalhe a partir de `{{args}}` e do contexto da conversa.
2. Se faltar o tema central, pergunte ao usuario antes de escrever.
3. Produza uma nota em Markdown pronta para Obsidian, com headings claros e conteudo didatico.
4. Quando fizer sentido, inclua uma secao "Pontos visuais sugeridos" com conceitos que depois podem ser enriquecidos por `/mednotes:enrich`.
5. Nao invente condutas individualizadas para pacientes reais; mantenha o texto como material educacional.

Se o usuario pediu para salvar em arquivo, escolha um nome curto em kebab-case e confirme o caminho antes de gravar quando houver risco de sobrescrever arquivo existente.
"""
