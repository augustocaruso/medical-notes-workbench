description = "Cria flashcards medicos no Anki via Anki MCP."
prompt = '''
Crie flashcards medicos no Anki a partir do material indicado pelo usuario.

Argumentos do usuario: {{args}}

Use o subagent `med-flashcard-maker` desta extensao. A extensao declara o MCP
`anki`, baseado em `@ankimcp/anki-mcp-server` + AnkiConnect local. Esse MCP
expoe o prompt `/twenty_rules`; use esse prompt como guia primario para a
formulacao dos cards quando ele ja estiver carregado no contexto. O prompt MCP
e um slash command, nao uma ferramenta; as ferramentas Anki autorizadas aparecem
como `mcp_anki_*`. O hook `mednotes-ensure-anki` deve tentar abrir o Anki antes
de ferramentas Anki; se o MCP nao aparecer, explique que o Anki Desktop precisa
estar aberto e com o add-on AnkiConnect instalado.

Fluxo:
1. Identifique a fonte em `{{args}}`: caminho de nota Markdown, trecho colado,
   topico, chat atual ou selecao do usuario. Se nao houver fonte suficiente,
   pergunte antes de criar cards.
2. Defina o deck destino. Se houver caminho de nota Obsidian, derive o deck
   desse caminho conforme `flashcard-ingestion.md`; se nao houver caminho nem
   deck indicado, use `Medicina::Inbox`.
3. Peça ao subagent `med-flashcard-maker` para usar o prompt MCP `/twenty_rules`
   do servidor `anki`. Se esse prompt nao estiver carregado/presente no contexto,
   pare e peça ao usuario para executar `/twenty_rules` primeiro. Nao substitua
   por uma copia local.
4. Leia e siga `${extensionPath}/knowledge/flashcard-ingestion.md` para as
   especificacoes locais de ingestao: deck espelhando o Obsidian, sem tags e
   `Verso Extra` com quebra inicial.
5. O subagent deve listar/criar o deck com `mcp_anki_listDecks`/
   `mcp_anki_createDeck`, inspecionar modelos com `mcp_anki_modelNames`/
   `mcp_anki_modelFieldNames` e criar cards com `mcp_anki_addNotes` em lote
   quando possivel.
6. Para lotes acima de 40 cards, gere uma previa e peça confirmacao antes de
   gravar no Anki.
7. Ao final, responda em portugues com deck, quantidade criada, modelo/campos,
   conceitos omitidos e qualquer falha do Anki MCP.

Nao crie cards de fatos que nao estejam compreendidos ou suportados pela fonte.
Nao transforme listas longas em um unico card. Nao crie conduta individualizada
para paciente real; mantenha o material educacional.
'''
