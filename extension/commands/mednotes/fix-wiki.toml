description = "Audita e corrige a saude da Wiki_Medicina: estilo, reescritas e grafo."
prompt = '''
Audite ou corrija a saúde da Wiki_Medicina.

Argumentos do usuário: {{args}}

Use a skill `fix-medical-wiki`. Ela é o runbook oficial; o resumo do workflow
está em `docs/workflows/fix-wiki.md`.

Invariantes do launcher:
- Preview primeiro: `med_ops.py fix-wiki --json`.
- Aplique apenas com pedido explícito (`--apply`, `--yes`, "aplicar", "corrigir de verdade").
- Ao aplicar, use `--backup` por padrão salvo pedido contrário.
- Reescritas LLM só quando o JSON trouxer `requires_llm_rewrite: true`; planeje com
  `plan-subagents --phase style-rewrite --max-concurrency 3`.
- `fix-wiki` não publica chats e não move taxonomia. Se `taxonomy_action_required`
  vier verdadeiro, aponte `taxonomy-migrate`.
- Use `/mednotes:link` para linkagem pura.
'''
