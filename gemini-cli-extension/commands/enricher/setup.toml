description = "Prepara o ambiente Python local da extensao medical-notes-enricher."
prompt = """
Prepare o Medical Notes Enricher para uso nesta maquina.

Use a extensao instalada em `~/.gemini/extensions/medical-notes-enricher` como raiz padrao. Se esse caminho nao existir, procure um diretorio contendo `gemini-extension.json` com `"name": "medical-notes-enricher"` ou pergunte ao usuario onde a extensao foi instalada.

Passos:
1. Rode `python3 -m venv .venv` na raiz da extensao, se `.venv` ainda nao existir.
2. Rode `.venv/bin/python -m pip install -e .`.
3. Se `config.toml` nao existir, copie `config.example.toml` para `config.toml`.
4. Confira se `[vault].path` esta preenchido. Se estiver vazio, pergunte ao usuario o caminho do vault Obsidian e atualize `config.toml`.
5. Se o usuario quiser SerpAPI e `.env` nao existir, copie `.env.example` para `.env` e peca a chave.
6. Rode `.venv/bin/python -m pytest` apenas se o usuario pedir validacao completa; para setup normal, basta testar `.venv/bin/python -m enricher --help`.

Explique em portugues o que foi configurado e o que ainda falta.
"""
